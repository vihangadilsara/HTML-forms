<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<center><h1>Hotel Paradise</h1></center>
<hr size="10" color="black">
  <table>
    
  <tr>
    <td>
        <label for="firstName" class="form-label">First Name :</label>
    </td>
    
    <td>
        <input type="text" class="form-control" placeholder="First name" aria-label="First name">
    </td>
   <td>
      <label for="lastName" class="form-label">Last Name :</label>
    </td>
    
    <td>
      <input type="text" class="form-control" placeholder="Last name" aria-label="Last name">
    </td>
  </tr>
  <tr>
    <td>
      <label for="adress 1" class="form-label">Address 1 :</label>
    </td>
    <td>
      <input type="text" class="form-control" placeholder="Address 1" aria-label="Address 1">
    </td>
    <td>
      <label for="adress 2" class="form-label">Address 2 :</label>
    </td>
    <td>
      <input type="text" class="form-control" placeholder="Address 2" aria-label="Address 2">
    </td>
  </tr>
    <tr>
        <td>
        <label for="city" class="form-label">City :</label>
        </td>
        <td>
        <input type="text" class="form-control" placeholder="City" aria-label="City">
        </td>
        <td>
        <label for="state" class="form-label">State :</label>
        </td>
        <td>
        <input type="text" class="form-control" placeholder="State" aria-label="State">
        </td>
    </tr>
    <tr>
        <td>
        <label for="zip" class="form-label">Zip code :</label>
        </td>
        <td>
        <input type="text" class="form-control" placeholder="Zip code" aria-label="Zip code">
        </td>
        <td>
        <label for="country" class="form-label">Country :</label>
        </td>
        <td>
        <input type="text" class="form-control" placeholder="Country" aria-label="Country">
        </td>
    </tr>
    <tr>
        <td>
        <label for="email" class="form-label">Email :</label>
        </td>
        <td>
        <input type="text" class="form-control" placeholder="Email" aria-label="Email">
        </td>
        <td>
        <label for="phone" class="form-label">Phone :</label>
        </td>
        <td>
        <input type="text" class="form-control" placeholder="Phone" aria-label="Phone">
        </td>
    </tr>
    <tr>
        <td>
        <label for="checkin" class="form-label">Check-in Date :</label>
        </td>
        <td>
        <input type="date" class="form-control" placeholder="Check-in Date" aria-label="Check-in Date">
        </td>
        
        <td>
        <label for="checkout" class="form-label">Check-out Date :</label>
        </td>
        <td>
        <input type="date" class="form-control" placeholder="Check-out Date" aria-label="Check-out Date">
        </td>
    </tr>
    <tr>    
        <td>Room Type</td>
        <td>
            <select class="form-select" aria-label="Default select example">
                <option selected>Open this select menu</option>
                <option value="1">Single Room</option>
                <option value="2">Double Room</option>
                <option value="3">Suite</option>
            </select>
        </td>
    </tr>
    <tr>
        <td>Number of Guests</td>
        <td>
            <input type="number" class="form-control" placeholder="Number of Guests" aria-label="Number of Guests">
        </td>
    </tr>
    <tr>
        <td>Special Requests</td>
        <td>
            <textarea class="form-control" placeholder="Special Requests" aria-label="Special Requests"></textarea>
        </td>



    </tr>
    <tr>
        <td>
            <button type="submit" class="btn btn-primary">Submit</button>
        </td>
        <td>
            <button type="reset" class="btn btn-secondary">Reset</button>
        </td>
    </tr>











</table>







<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
